services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:${PG_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./Backend
    # 开发模式：源代码挂载 + 文件变更自动热重载，避免每次改 .py 都 rebuild 镜像
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "/app/app"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      MCDR_SERVICE_TOKEN: ${MCDR_SERVICE_TOKEN}
      WEB_BASE_URL: ${WEB_BASE_URL}
      ARCHIVE_ROOT: /app/archive
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      # 只挂载源码目录：改 .py 文件后 uvicorn --reload 自动重启，依赖变更（pyproject.toml）才需 rebuild
      - ./Backend/app:/app/app
      - ./Backend/alembic:/app/alembic
      - ./Archive:/app/archive   # 归档 markdown 落盘（持久化 + 未来 wiki 同步入口）

  # 前端 web 服务（nginx 托管 Frontend/dist + 反代 /api 到 backend）。
  # 默认启用：.env 的 COMPOSE_PROFILES=web；清空/删除该行即禁用（profile 不激活则本服务不启动）。
  # 宿主端口默认 5173：免 root、对齐 WEB_BASE_URL 默认值（单机 !!PCH login 回链开箱即用）。
  web:
    build:
      context: ./Frontend
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-}
    profiles: ["web"]
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-5173}:80"
    restart: unless-stopped

volumes:
  pgdata:
