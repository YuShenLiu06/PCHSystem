# nginx 站点配置（容器内方案，烘焙进 Frontend 镜像）
# 权威源：本文件（Frontend/nginx.conf）。非容器方案见 Deploy/Nginx/pchsystem.host.conf.example。
#
# 反代目标用 compose 服务名 backend:8000（同 docker 网络）；与 vite dev 的 rewrite 对齐：
# 浏览器 /api/me → 此处 proxy_pass http://backend:8000/ → 后端收到 /me（去掉 /api 前缀）。
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA history 模式 fallback（createWebHistory 必须，否则刷新 /sheets/3 → 404）
    location / { try_files $uri $uri/ /index.html; }

    # /api 反代到后端：末尾 / 必带 → 去掉 /api 前缀
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 内容哈希静态资源：长缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
